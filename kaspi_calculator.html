<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор маржинальности — Kaspi</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2333;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f2f8;
    --text2: #8892a4;
    --text3: #555e70;
    --accent: #4f7cff;
    --accent2: #3d62d4;
    --green: #22c97a;
    --yellow: #f5a623;
    --red: #ff4d4d;
    --green-bg: rgba(34,201,122,0.1);
    --yellow-bg: rgba(245,166,35,0.1);
    --red-bg: rgba(255,77,77,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Golos Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  header p {
    font-size: 13px;
    color: var(--text2);
  }

  .rate-pill {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 20px;
  }

  .rate-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .rate-dot.loading {
    background: var(--yellow);
    animation: pulse 1s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field label {
    font-size: 12px;
    color: var(--text2);
  }

  .field input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text3); }

  .currency-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .cur-btn {
    padding: 9px 6px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .cur-btn:hover { border-color: var(--border2); color: var(--text); }

  .cur-btn.active {
    background: rgba(79,124,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }

  .results-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  .metric {
    background: var(--bg2);
    padding: 16px 18px;
  }

  .metric-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .metric-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }

  .metric-value.positive { color: var(--green); }
  .metric-value.negative { color: var(--red); }
  .metric-value.warning { color: var(--yellow); }

  .margin-track {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }

  .margin-fill {
    height: 4px;
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .verdict {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 500;
    border-top: 1px solid var(--border);
  }

  .verdict.green { color: var(--green); background: var(--green-bg); display: flex; }
  .verdict.yellow { color: var(--yellow); background: var(--yellow-bg); display: flex; }
  .verdict.red { color: var(--red); background: var(--red-bg); display: flex; }

  .verdict-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
  }

  .green .verdict-icon { background: rgba(34,201,122,0.2); }
  .yellow .verdict-icon { background: rgba(245,166,35,0.2); }
  .red .verdict-icon { background: rgba(255,77,77,0.2); }

  .breakdown-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 12px;
  }

  .breakdown-header {
    padding: 12px 18px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
  }

  .breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .breakdown-row:last-child { border-bottom: none; }

  .breakdown-label { color: var(--text2); }

  .breakdown-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
  }

  .breakdown-row.total {
    background: var(--bg3);
    font-weight: 500;
  }

  .breakdown-row.total .breakdown-label { color: var(--text); }
  .breakdown-row.total .breakdown-val { color: var(--text); font-size: 14px; }

  .bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bar-track {
    flex: 1;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    max-width: 60px;
  }

  .bar-fill {
    height: 3px;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.3s;
  }

  .empty-state {
    text-align: center;
    padding: 32px 20px;
    color: var(--text3);
    font-size: 14px;
  }

  @media (max-width: 480px) {
    .grid3 { grid-template-columns: 1fr 1fr; }
    .metric-value { font-size: 18px; }
    header h1 { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">📦</div>
  <div>
    <h1>Калькулятор маржинальности</h1>
    <p>Kaspi marketplace</p>
  </div>
  <div class="rate-pill">
    <div class="rate-dot loading" id="rate_dot"></div>
    <span id="rate_text">Загружаю курс...</span>
  </div>
</header>

<main>

  <div class="card">
    <div class="card-title">Курс и параметры</div>
    <div class="grid3" style="margin-bottom:10px">
      <div class="field">
        <label>USD → ₸</label>
        <input type="number" id="usd_rate" value="525" step="1" oninput="calc()">
      </div>
      <div class="field">
        <label>CNY → ₸</label>
        <input type="number" id="cny_rate" value="72" step="0.1" oninput="calc()">
      </div>
      <div class="field">
        <label>Мин. маржа %</label>
        <input type="number" id="min_margin" value="25" step="1" oninput="calc()">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Товар</div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field">
        <label>Цена продажи на Каспи ₸</label>
        <input type="number" id="price" placeholder="99 500" oninput="calc()">
      </div>
      <div class="field">
        <label>Вес, кг</label>
        <input type="number" id="weight" placeholder="10" step="0.1" oninput="calc()">
      </div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field">
        <label>Стоимость товара</label>
        <input type="number" id="cost_val" placeholder="0" oninput="calc()">
      </div>
      <div class="field">
        <label>Валюта товара</label>
        <div class="currency-row">
          <div class="cur-btn active" id="btn_cny" onclick="setCurrency('cny')">¥ CNY</div>
          <div class="cur-btn" id="btn_usd" onclick="setCurrency('usd')">$ USD</div>
          <div class="cur-btn" id="btn_kzt" onclick="setCurrency('kzt')">₸ KZT</div>
        </div>
      </div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field">
        <label>Доставка из Китая, $/кг</label>
        <input type="number" id="china_rate" value="1.30" step="0.05" oninput="calc()">
      </div>
      <div class="field">
        <label>Маркетинг Каспи, %</label>
        <input type="number" id="marketing" value="3" step="0.5" oninput="calc()">
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Упаковка ₸</label>
        <input type="number" id="packaging" value="1200" oninput="calc()">
      </div>
      <div class="field">
        <label>Доп. расходы ₸</label>
        <input type="number" id="extra" value="3800" oninput="calc()">
      </div>
    </div>
  </div>

  <div class="results-card">
    <div class="metrics-grid" id="metrics_grid">
      <div class="metric">
        <div class="metric-label">Прибыль с ед.</div>
        <div class="metric-value" id="res_profit">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Маржинальность</div>
        <div class="metric-value" id="res_margin">—</div>
        <div class="margin-track"><div class="margin-fill" id="margin_fill"></div></div>
      </div>
      <div class="metric">
        <div class="metric-label">Все затраты</div>
        <div class="metric-value" id="res_costs">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Мин. цена (<span id="min_pct">25</span>%)</div>
        <div class="metric-value" id="res_min_price">—</div>
      </div>
    </div>
    <div class="verdict" id="verdict">
      <div class="verdict-icon" id="verdict_icon"></div>
      <span id="verdict_text"></span>
    </div>
  </div>

  <div class="breakdown-card">
    <div class="breakdown-header">Разбивка затрат</div>
    <div id="breakdown">
      <div class="empty-state">Введите данные товара</div>
    </div>
  </div>

</main>

<script>
let currency = 'cny';
let totalCostsGlobal = 0;

function setCurrency(c) {
  currency = c;
  ['cny','usd','kzt'].forEach(x => document.getElementById('btn_'+x).className = 'cur-btn' + (x===c?' active':''));
  calc();
}

function kaspiDelivery(price, weight) {
  if (!price || !weight) return 0;
  if (price < 1000) return 66;
  if (price < 3000) return 200;
  if (price < 5000) return 268;
  if (price < 10000) return 1075;
  if (weight <= 5) return 1507;
  if (weight <= 15) return 1971;
  if (weight <= 30) return 4175;
  if (weight <= 60) return 6553;
  if (weight <= 100) return 9917;
  return 13919;
}

function fmt(n) {
  if (isNaN(n) || n === undefined) return '—';
  return '₸\u202f' + Math.round(n).toLocaleString('ru-RU');
}

function pct(val, total) {
  if (!total) return 0;
  return Math.min(100, Math.round(val / total * 100));
}

function calc() {
  const usd = parseFloat(document.getElementById('usd_rate').value) || 525;
  const cny = parseFloat(document.getElementById('cny_rate').value) || 72;
  const minM = parseFloat(document.getElementById('min_margin').value) || 25;
  document.getElementById('min_pct').textContent = minM;

  const price = parseFloat(document.getElementById('price').value) || 0;
  const weight = parseFloat(document.getElementById('weight').value) || 0;
  const costVal = parseFloat(document.getElementById('cost_val').value) || 0;
  const chinaRate = parseFloat(document.getElementById('china_rate').value) || 0;
  const marketingPct = parseFloat(document.getElementById('marketing').value) || 0;
  const packaging = parseFloat(document.getElementById('packaging').value) || 0;
  const extra = parseFloat(document.getElementById('extra').value) || 0;

  let costKzt = currency === 'cny' ? costVal * cny : currency === 'usd' ? costVal * usd : costVal;

  const chinaDelivery = weight * chinaRate * usd;
  const kaspiDel = kaspiDelivery(price, weight);
  const marketing = price * marketingPct / 100;
  const commission = price * 0.13;
  const tax = price * 0.03;
  const totalCosts = costKzt + chinaDelivery + kaspiDel + marketing + commission + tax + packaging + extra;
  const profit = price - totalCosts;
  const margin = price > 0 ? (profit / price * 100) : 0;
  const minPrice = totalCosts > 0 ? totalCosts / (1 - minM / 100) : 0;
  totalCostsGlobal = totalCosts;

  if (price > 0) {
    const mClass = margin >= minM ? 'positive' : margin >= minM * 0.75 ? 'warning' : 'negative';
    document.getElementById('res_profit').className = 'metric-value ' + mClass;
    document.getElementById('res_profit').textContent = fmt(profit);
    document.getElementById('res_margin').className = 'metric-value ' + mClass;
    document.getElementById('res_margin').textContent = Math.round(margin) + '%';
    document.getElementById('res_costs').className = 'metric-value';
    document.getElementById('res_costs').textContent = fmt(totalCosts);
    document.getElementById('res_min_price').className = 'metric-value';
    document.getElementById('res_min_price').textContent = fmt(minPrice);

    const fill = document.getElementById('margin_fill');
    fill.style.width = Math.min(Math.max(margin, 0), 100) + '%';
    fill.style.background = margin >= minM ? '#22c97a' : margin >= minM * 0.75 ? '#f5a623' : '#ff4d4d';

    const verdict = document.getElementById('verdict');
    const icon = document.getElementById('verdict_icon');
    const txt = document.getElementById('verdict_text');
    if (margin >= minM) {
      verdict.className = 'verdict green';
      icon.textContent = '✓';
      txt.textContent = 'Работаем — маржа выше минимума';
    } else if (margin >= minM * 0.75) {
      verdict.className = 'verdict yellow';
      icon.textContent = '!';
      txt.textContent = 'Пограничная маржа — нужно торговаться с поставщиком';
    } else {
      verdict.className = 'verdict red';
      icon.textContent = '✕';
      txt.textContent = 'Не работаем — маржа ниже допустимой';
    }

    const rows = [
      ['Стоимость товара', costKzt],
      ['Доставка из Китая', chinaDelivery],
      ['Доставка Каспи', kaspiDel],
      ['Маркетинг Каспи', marketing],
      ['Комиссия Каспи 13%', commission],
      ['Налог 3%', tax],
      ['Упаковка', packaging],
      ['Доп. расходы', extra],
    ];

    document.getElementById('breakdown').innerHTML = rows.map(([label, val]) => {
      const p = pct(val, totalCosts);
      return `<div class="breakdown-row">
        <span class="breakdown-label">${label}</span>
        <div class="bar-wrap">
          <div class="bar-track"><div class="bar-fill" style="width:${p}%"></div></div>
          <span class="breakdown-val">${val > 0 ? fmt(val) : '—'}</span>
        </div>
      </div>`;
    }).join('') + `<div class="breakdown-row total">
      <span class="breakdown-label">Все затраты</span>
      <span class="breakdown-val">${fmt(totalCosts)}</span>
    </div>`;
  } else {
    ['res_profit','res_margin','res_costs','res_min_price'].forEach(id => {
      document.getElementById(id).textContent = '—';
      document.getElementById(id).className = 'metric-value';
    });
    document.getElementById('margin_fill').style.width = '0%';
    document.getElementById('verdict').className = 'verdict';
    document.getElementById('breakdown').innerHTML = '<div class="empty-state">Введите данные товара</div>';
  }
}

async function loadRates() {
  try {
    const r = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
    const d = await r.json();
    const usdKzt = d.usd?.kzt;
    const usdCny = d.usd?.cny;
    if (usdKzt && usdCny) {
      const cnyKzt = usdKzt / usdCny;
      document.getElementById('usd_rate').value = Math.round(usdKzt);
      document.getElementById('cny_rate').value = cnyKzt.toFixed(2);
      document.getElementById('rate_dot').className = 'rate-dot';
      document.getElementById('rate_text').textContent = '$1 = ₸' + Math.round(usdKzt) + '  ·  ¥1 = ₸' + cnyKzt.toFixed(1);
      calc();
    }
  } catch(e) {
    document.getElementById('rate_dot').style.background = '#f5a623';
    document.getElementById('rate_text').textContent = 'Введите курс вручную';
  }
}

document.getElementById('usd_rate').addEventListener('input', calc);
document.getElementById('cny_rate').addEventListener('input', calc);
document.getElementById('min_margin').addEventListener('input', calc);
loadRates();
</script>
</body>
</html>
